worktree_dir: .worktrees

files:
  copy:
    - .env
    - backend/.env
    - frontend/.env
    - micro-services/emails-fetcher/.env
    - supabase/functions/.env
  symlink:
    - node_modules
    - backend/node_modules
    - frontend/node_modules

post_create:
  - "<global>"
  - npm run dev:generate-env 2>/dev/null

layouts:
  dev:
    panes:
      - command: opencode
        focus: true
      - command: npm run dev:backend-api
        split: horizontal
        size: 10
      - command: npm run dev:frontend
        split: vertical
        size: 15
      - command: clear
        split: horizontal
        size: 10
  test:
    panes:
      - command: opencode
        focus: true
      - command: clear
        split: horizontal
        size: 15
      - command: npm run test:unit --prefix backend
        split: vertical
        size: 15
  agents:
    panes:
      - command: opencode
        focus: true
      - command: opencode
        split: horizontal
